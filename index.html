<!DOCTYPE html>
<html>
<body style="font-family: Arial; max-width:600px; margin:auto;">

<h2>AI Assistant</h2>

<input id="input" placeholder="Type here..." style="width:75%;" />
<button onclick="send()">Send</button>

<p id="response"></p>

<script>
async function send() {
  const message = document.getElementById("input").value;

  try {
    const res = await fetch("https://assort.charvi.buzz/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    document.getElementById("response").innerText = data.reply;

  } catch (err) {
    document.getElementById("response").innerText = "Error: " + err;
  }
}
</script>

</body>
</html>
